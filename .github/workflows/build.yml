name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
      - ci/android-build
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: 36
          build-tools: 35.0.0
          ndk-version: 27.1.12297006

      - name: 📦 Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: 🔨 Build Android Debug APK
        working-directory: ./mobile/android
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: 📱 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: 🔐 Build Android Release APK (Unsigned)
        working-directory: ./mobile/android
        run: ./gradlew assembleRelease -x signReleaseBundle --stacktrace
        continue-on-error: true

      - name: 📦 Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release-unsigned
          path: mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: 📊 Build Summary
        if: always()
        run: |
          echo "✅ Build workflow completed!"
          echo "📁 Output location: mobile/android/app/build/outputs/apk/"
          find mobile/android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK files found yet"

      - name: ❌ Build Failed
        if: failure()
        run: |
          echo "Build failed - Check the logs above for details"
          exit 1
